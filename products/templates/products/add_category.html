{% extends "base.html" %}

{% block title %}
Add Category
{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

<h3>Add New Category</h3>

</div>

<div class="card-body">

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label class="form-label">
Category Name
</label>

{{ form.name }}

</div>

<button type="submit"
class="btn btn-success">

Save Category

</button>

<a href="{% url 'category_list' %}"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
