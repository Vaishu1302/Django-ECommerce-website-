{% extends "base.html" %}

{% block title %}
{% if form.instance.pk %}
Update Product
{% else %}
Add Product
{% endif %}
{% endblock %}

{% block content %}

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3 class="mb-0">

{% if form.instance.pk %}
Update Product
{% else %}
Add Product
{% endif %}

</h3>

</div>

<div class="card-body">

<form method="POST" enctype="multipart/form-data">

{% csrf_token %}

{{ form.as_p }}

<button type="submit" class="btn btn-success">
Save Product
</button>

<a href="{% url 'product_list' %}"
class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</div>

</div>

</div>

</div>

{% endblock %}
