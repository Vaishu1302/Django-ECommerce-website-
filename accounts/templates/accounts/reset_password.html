{% extends "base.html" %}

{% block title %}
Reset Password
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-warning text-dark text-center">

                    <h3>Reset Password</h3>

                </div>

                <div class="card-body">

                    {% if messages %}

                        {% for message in messages %}

                            <div class="alert alert-danger">

                                {{ message }}

                            </div>

                        {% endfor %}

                    {% endif %}

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">

                            <label class="form-label">

                                New Password

                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter New Password"
                                required
                            >

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Confirm Password

                            </label>

                            <input
                                type="password"
                                name="confirm_password"
                                class="form-control"
                                placeholder="Confirm New Password"
                                required
                            >

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100"
                        >

                            Reset Password

                        </button>

                    </form>

                    <div class="text-center mt-3">

                        <a href="{% url 'login' %}">

                            Back to Login

                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
