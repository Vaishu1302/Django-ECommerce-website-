{% extends "base.html" %}

{% block title %}
Delete Review
{% endblock %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-header bg-danger text-white">

                    <h3>Delete Review</h3>

                </div>

                <div class="card-body">

                    <p class="fs-5">

                        Are you sure you want to delete your review for

                        <strong>{{ review.product.name }}</strong>?

                    </p>

                    <form method="POST">

                        {% csrf_token %}

                        <button
                            type="submit"
                            class="btn btn-danger"
                        >
                            Yes, Delete
                        </button>

                        <a
                            href="{% url 'product_detail' review.product.id %}"
                            class="btn btn-secondary"
                        >
                            Cancel
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
